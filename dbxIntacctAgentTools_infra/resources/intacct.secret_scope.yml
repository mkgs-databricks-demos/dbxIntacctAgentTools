# Secret scope for Intacct app SPN credentials AND Sage Intacct API credentials.
#
# Two credential families live in this scope:
#
# 1. Databricks app SPN — auto-provisioned by the ensure-service-principal
#    notebook (UC setup job) for OAuth M2M into the Databricks workspace:
#
#    AUTO-PROVISIONED keys:
#      {client_id_dbs_key}      — SPN application_id (OAuth M2M)
#      workspace_url            — Databricks workspace URL
#
#    ADMIN-PROVISIONED keys:
#      {client_secret_dbs_key}  — SPN OAuth secret (UI/CLI/keystore)
#
# 2. Sage Intacct API — admin-provisioned. The same scope, fixed key names.
#    All Sage credentials are managed by humans/keystore, NEVER auto-generated.
#
#    Required (single ISV identity for the Databricks app):
#      intacct_sender_id        — ISV Sender ID issued by Sage
#      intacct_sender_password  — ISV Sender password issued by Sage
#
#    Per-tenant (one user per Sage Intacct company served by the app):
#      intacct_user_<company_id>          — Web Services user ID
#      intacct_password_<company_id>      — Web Services user password
#
#    Tenant credential layout is conventional, not enforced. The app's
#    tenant registry (in Lakebase) maps tenant config IDs → secret keys.
#
# Provisioning steps (admin, after first deploy):
#
#   # 1. Generate the Databricks SPN secret (one-time)
#   databricks account service-principal-secrets create <sp_id>
#   databricks secrets put-secret <scope> <client_secret_dbs_key> --string-value "<secret>"
#
#   # 2. Add Sage ISV credentials (one-time)
#   databricks secrets put-secret <scope> intacct_sender_id     --string-value "<sender>"
#   databricks secrets put-secret <scope> intacct_sender_password --string-value "<pwd>"
#
#   # 3. Add per-tenant Sage user credentials (per company)
#   databricks secrets put-secret <scope> intacct_user_acmecorp     --string-value "<ws-user>"
#   databricks secrets put-secret <scope> intacct_password_acmecorp --string-value "<ws-pwd>"

resources:
  secret_scopes:
    intacct_secret_scope:
      name: ${var.secret_scope_name}
      backend_type: DATABRICKS
      lifecycle:
        prevent_destroy: true

# ---------------------------------------------------------------------------
# Target-specific permissions
# (App SPN READ permission is granted dynamically by ensure-service-principal)
# ---------------------------------------------------------------------------
targets:

  dev:
    resources:
      secret_scopes:
        intacct_secret_scope:
          name: ${var.secret_scope_name}
          permissions:
            - user_name: ${var.run_as_user}
              level: MANAGE
            - user_name: matthew.giglia@databricks.com
              level: MANAGE

  hls_fde:
    resources:
      secret_scopes:
        intacct_secret_scope:
          name: ${var.secret_scope_name}
          permissions:
            - user_name: matthew.giglia@databricks.com
              level: MANAGE
            - service_principal_name: ${var.higher_level_service_principal}
              level: MANAGE

  prod:
    resources:
      secret_scopes:
        intacct_secret_scope:
          name: ${var.secret_scope_name}
          permissions:
            - user_name: matthew.giglia@databricks.com
              level: MANAGE
            - service_principal_name: ${var.higher_level_service_principal}
              level: MANAGE
