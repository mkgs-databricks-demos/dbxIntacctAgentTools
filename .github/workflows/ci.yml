name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  appkit:
    name: AppKit (typecheck, lint, vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dbxIntacctAgentTools_mcp/mcp-intacct
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          # Pinned to 22 LTS — Node 24 + npm 11 + native opt-deps in our
          # tree (sharp, rolldown-vite override, @ast-grep/napi) hits npm's
          # "Exit handler never called!" bug and hangs `npm ci` for 8 min
          # before failing.
          node-version: '22'
          cache: npm
          cache-dependency-path: dbxIntacctAgentTools_mcp/mcp-intacct/package-lock.json

      - name: Install dependencies
        # `--ignore-scripts` skips the postinstall hook (`appkit generate-types`),
        # which talks to an AppKit-hosted resource and hangs in CI without
        # workspace auth. We don't reference the generated types in CI tests.
        run: npm ci --ignore-scripts

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Vitest
        # Skip the smoke spec that requires Playwright + a running server.
        # vitest filters out playwright specs by directory; we only run the
        # unit suites under tests/ that don't import @playwright/test.
        run: npx vitest run

  python-sdk:
    name: Python SDK (pytest, ruff, mypy)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dbxIntacctAgentTools_sdk
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install package + dev extras
        run: pip install -e '.[dev]'

      - name: Ruff
        run: ruff check src tests

      - name: Mypy
        run: mypy src/intacct_sdk

      - name: Pytest
        run: pytest

  # Note: `databricks bundle validate` makes a real SCIM call to resolve
  # the workspace user, so it can't run in CI without a real workspace
  # service principal. Local validation is the gate today — `deploy.sh`
  # runs `bundle validate` for both bundles before any deploy. Adding a
  # CI bundle-validate job is tracked as a future cleanup once a workspace
  # SP credential is available to GitHub Actions.
